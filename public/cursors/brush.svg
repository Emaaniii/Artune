<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Bristles teardrop, golden yellow with bold dark outline.
       Tip is at (3, 3) — the cursor's hot-spot is set to that point. -->
  <path d="M 3 3 Q 11 1.5 14 6 Q 15 10 11 13 Q 6 16 3 14 Z"
        fill="#fbbf24" stroke="#2a1607" stroke-width="1.4"
        stroke-linejoin="round" stroke-linecap="round" />
  <!-- A few hand-drawn strands inside the bristles -->
  <path d="M 4 5 Q 8 6 11 9 M 5 9 Q 9 10 12 12"
        stroke="#92400e" stroke-width="0.8" fill="none"
        stroke-linecap="round" />
  <!-- Silver ferrule diagonal -->
  <rect x="9" y="11" width="6.5" height="3.2" rx="0.5"
        fill="#cbd5e1" stroke="#2a1607" stroke-width="1"
        transform="rotate(45 12.25 12.6)" />
  <!-- Wooden handle, tapered cone toward bottom-right -->
  <path d="M 14.5 13.5 L 28 27 Q 28 28.5 26.5 28.5 L 13 15 Z"
        fill="#e89863" stroke="#2a1607" stroke-width="1.2"
        stroke-linejoin="round" stroke-linecap="round" />
  <!-- Handle highlight stripe -->
  <path d="M 15 14.5 L 26 25.5"
        stroke="#f8d0a8" stroke-width="0.9" fill="none"
        stroke-linecap="round" opacity="0.85" />
</svg>
